<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tool moved · Ford DASH MPD Health Check</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }

  :root {
    --bg: #f7f8fa;
    --surface: #ffffff;
    --border: #e4e7eb;
    --border-strong: #cdd2d9;
    --text: #1a1f2e;
    --text-secondary: #5a6478;
    --text-tertiary: #8b94a6;
    --accent: #2563eb;
    --button-bg: #1a1f2e;
    --button-bg-hover: #2d3441;
    --button-fg: #ffffff;
    --mono: ui-monospace, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1217;
      --surface: #181c24;
      --border: #2a303b;
      --border-strong: #3a4150;
      --text: #e6e8ec;
      --text-secondary: #9ba3b3;
      --text-tertiary: #6b7385;
      --accent: #60a5fa;
      --button-bg: #e6e8ec;
      --button-bg-hover: #ffffff;
      --button-fg: #0f1217;
    }
  }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-size: 14px;
    line-height: 1.5;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .container {
    width: 100%;
    max-width: 460px;
    text-align: center;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 40px 32px 32px;
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0 0 6px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 24px;
  }

  .countdown {
    font-family: var(--mono);
    font-size: 64px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1;
    margin: 8px 0 24px;
    font-variant-numeric: tabular-nums;
  }

  button {
    background: var(--button-bg);
    color: var(--button-fg);
    border: 1px solid var(--button-bg);
    border-radius: 6px;
    padding: 10px 20px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }

  button:hover {
    background: var(--button-bg-hover);
    border-color: var(--button-bg-hover);
  }

  button:active { transform: translateY(1px); }
</style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>The MPD Health Check tool has moved</h1>
      <div class="subtitle">Redirecting you automatically in…</div>

      <div class="countdown" id="countdown" aria-live="polite">3</div>

      <button type="button" id="goBtn">Or switch manually now</button>
    </div>
  </div>

<script>
  // ── Configure this per copy of the redirect file ──────────────────────
  const TARGET_URL = "https://www.ford.eu/videos/guxeu/tools/mpd-health-check.html";
  const COUNTDOWN_SECONDS = 3;
  // ──────────────────────────────────────────────────────────────────────

  const countdownEl = document.getElementById('countdown');
  const goBtn = document.getElementById('goBtn');

  let seconds = COUNTDOWN_SECONDS;
  countdownEl.textContent = seconds;

  const timer = setInterval(() => {
    seconds--;
    countdownEl.textContent = Math.max(0, seconds);
    if (seconds <= 0) {
      clearInterval(timer);
      window.location.replace(TARGET_URL);
    }
  }, 1000);

  goBtn.addEventListener('click', () => {
    clearInterval(timer);
    window.location.replace(TARGET_URL);
  });
</script>
</body>
</html>
