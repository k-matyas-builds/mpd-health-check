<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DASH MPD Health Check</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }

  :root {
    --bg: #f7f8fa;
    --surface: #ffffff;
    --border: #e4e7eb;
    --border-strong: #cdd2d9;
    --text: #1a1f2e;
    --text-secondary: #5a6478;
    --text-tertiary: #8b94a6;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --success: #059669;
    --success-bg: #ecfdf5;
    --success-border: #a7f3d0;
    --success-text: #064e3b;
    --warning: #d97706;
    --warning-bg: #fffbeb;
    --warning-border: #fcd34d;
    --warning-text: #92400e;
    --danger: #dc2626;
    --danger-bg: #fef2f2;
    --danger-border: #fecaca;
    --danger-text: #7f1d1d;
    --button-bg: #1a1f2e;
    --button-bg-hover: #2d3441;
    --button-fg: #ffffff;
    --overlay: rgba(15, 18, 27, 0.55);
    --mono: ui-monospace, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  }

  html[data-theme="dark"] {
    --bg: #0f1217;
    --surface: #181c24;
    --border: #2a303b;
    --border-strong: #3a4150;
    --text: #e6e8ec;
    --text-secondary: #9ba3b3;
    --text-tertiary: #6b7385;
    --accent: #60a5fa;
    --accent-hover: #93c5fd;
    --success: #34d399;
    --success-bg: #052e22;
    --success-border: #065f46;
    --success-text: #a7f3d0;
    --warning: #fbbf24;
    --warning-bg: #2a1f08;
    --warning-border: #78350f;
    --warning-text: #fcd34d;
    --danger: #f87171;
    --danger-bg: #2a0f10;
    --danger-border: #7f1d1d;
    --danger-text: #fecaca;
    --button-bg: #e6e8ec;
    --button-bg-hover: #ffffff;
    --button-fg: #0f1217;
    --overlay: rgba(0, 0, 0, 0.7);
  }

  @media (prefers-color-scheme: dark) {
    html[data-theme="system"] {
      --bg: #0f1217;
      --surface: #181c24;
      --border: #2a303b;
      --border-strong: #3a4150;
      --text: #e6e8ec;
      --text-secondary: #9ba3b3;
      --text-tertiary: #6b7385;
      --accent: #60a5fa;
      --accent-hover: #93c5fd;
      --success: #34d399;
      --success-bg: #052e22;
      --success-border: #065f46;
      --success-text: #a7f3d0;
      --warning: #fbbf24;
      --warning-bg: #2a1f08;
      --warning-border: #78350f;
      --warning-text: #fcd34d;
      --danger: #f87171;
      --danger-bg: #2a0f10;
      --danger-border: #7f1d1d;
      --danger-text: #fecaca;
      --button-bg: #e6e8ec;
      --button-bg-hover: #ffffff;
      --button-fg: #0f1217;
      --overlay: rgba(0, 0, 0, 0.7);
    }
  }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-size: 14px;
    line-height: 1.5;
  }

  body { min-height: 100vh; padding: 32px 24px 64px; }

  .container { max-width: 720px; margin: 0 auto; }

  /* ── Header ── */
  header {
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0;
  }

  .header-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .header-subtitle {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  /* ── Theme switcher ── */
  .theme-switch {
    display: inline-flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px;
    gap: 0;
  }

  .theme-switch button {
    background: transparent;
    color: var(--text-tertiary);
    border: none;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
  }

  .theme-switch button:hover:not(:disabled) {
    background: transparent;
    color: var(--text-secondary);
    border: none;
  }

  .theme-switch button.active {
    background: var(--bg);
    color: var(--text);
  }

  .theme-switch button svg {
    width: 14px;
    height: 14px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* ── Picker card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .card-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-tertiary);
    margin-bottom: 10px;
  }

  .picker-prompt {
    font-size: 14px;
    color: var(--text);
    margin-bottom: 14px;
  }

  .picker-prompt code {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 12px;
  }

  .picker-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn-picker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    color: var(--text);
    padding: 10px 16px;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
  }

  .btn-picker:hover {
    background: var(--bg);
    border-color: var(--text-tertiary);
  }

  .btn-picker svg {
    width: 14px;
    height: 14px;
  }

  .picker-hint {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-tertiary);
  }

  #folderInput { display: none; }

  /* ── Scan info ── */
  .scan-info {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    display: none;
  }

  .scan-info.show { display: block; }

  .scan-info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .scan-info-row span:last-child {
    font-family: var(--mono);
    color: var(--text);
    font-size: 12px;
  }

  .scan-info-row.total {
    border-top: 1px solid var(--border);
    margin-top: 8px;
    padding-top: 12px;
    color: var(--text);
    font-weight: 500;
  }

  .scan-info-row.total span:last-child {
    font-weight: 600;
  }

  /* ── Action row ── */
  .action-row {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  button {
    background: var(--button-bg);
    color: var(--button-fg);
    border: 1px solid var(--button-bg);
    border-radius: 6px;
    padding: 10px 20px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, opacity 0.15s;
  }

  button:hover:not(:disabled) {
    background: var(--button-bg-hover);
    border-color: var(--button-bg-hover);
  }

  button:active:not(:disabled) { transform: translateY(1px); }

  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  button.secondary {
    background: var(--surface);
    color: var(--text);
    border-color: var(--border-strong);
  }

  button.secondary:hover:not(:disabled) {
    background: var(--bg);
    border-color: var(--text-tertiary);
  }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: var(--overlay);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 1000;
    animation: fadeIn 0.15s ease;
  }

  .modal-overlay.show { display: flex; }

  .modal-content {
    background: var(--surface);
    border-radius: 10px;
    max-width: 520px;
    width: 100%;
    padding: 28px;
    position: relative;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
    animation: slideIn 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .modal-close {
    position: absolute;
    top: 12px;
    right: 12px;
    background: transparent;
    color: var(--text-tertiary);
    border: none;
    width: 32px;
    height: 32px;
    padding: 0;
    border-radius: 6px;
    cursor: pointer;
    font-size: 20px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-close:hover {
    background: var(--bg);
    color: var(--text);
    border: none;
  }

  .result-icon-wrap {
    display: flex;
    justify-content: center;
    margin: 4px 0 16px;
  }

  .result-title {
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }

  .result-title.good { color: var(--success); }
  .result-title.bad  { color: var(--danger); }

  .result-sub {
    text-align: center;
    color: var(--text-secondary);
    font-size: 13px;
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .result-numbers {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    margin-bottom: 14px;
    font-size: 13px;
  }

  .result-numbers-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    color: var(--text-secondary);
  }

  .result-numbers-row span:last-child {
    font-family: var(--mono);
    font-weight: 600;
    color: var(--text);
  }

  .fix-suggestion {
    background: var(--warning-bg);
    border: 1px solid var(--warning-border);
    border-radius: 6px;
    padding: 12px 14px;
    margin-bottom: 18px;
  }

  .fix-suggestion-label {
    font-weight: 600;
    margin-bottom: 4px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--warning-text);
  }

  .fix-suggestion-value {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text);
    font-weight: 600;
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .error-message {
    background: var(--danger-bg);
    border: 1px solid var(--danger-border);
    border-left: 3px solid var(--danger);
    border-radius: 6px;
    padding: 12px 14px;
    color: var(--danger-text);
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 18px;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-10px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @media (max-width: 640px) {
    body { padding: 20px 16px 48px; }
    header { flex-direction: column; align-items: flex-start; gap: 8px; }
    .header-right { width: 100%; justify-content: space-between; }
    .picker-row { flex-direction: column; align-items: flex-start; }
    .modal-actions { flex-direction: column-reverse; }
    .modal-actions button { width: 100%; }
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>DASH MPD Health Check</h1>
        <div class="header-subtitle">Phantom segment detector</div>
      </div>
      <div class="header-right">
        <div class="theme-switch" role="group" aria-label="Theme">
          <button type="button" data-theme="light" title="Light theme" aria-label="Light theme">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="4"/>
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
            </svg>
          </button>
          <button type="button" data-theme="system" title="System theme" aria-label="System theme">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
              <line x1="8" y1="21" x2="16" y2="21"/>
              <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
          </button>
          <button type="button" data-theme="dark" title="Dark theme" aria-label="Dark theme">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <div class="card">
      <div class="card-label">Source folder</div>
      <div class="picker-prompt" id="pickerPrompt">Choose the packaged folder containing <code>stream.mpd</code></div>
      <div class="picker-row">
        <label class="btn-picker" for="folderInput">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          <span id="pickerBtnLabel">Select folder</span>
        </label>
        <span class="picker-hint" id="pickerHint">e.g. desktop, desktop-V2</span>
        <input type="file" id="folderInput" webkitdirectory directory multiple />
      </div>

      <div class="scan-info" id="scanInfo">
        <div class="card-label" style="margin-bottom: 8px;">Scan result</div>
        <div id="scanInfoBody"></div>
      </div>
    </div>

    <div class="action-row">
      <button class="" id="checkBtn" disabled>Run Health Check</button>
    </div>
  </div>

  <div id="modalOverlay" class="modal-overlay">
    <div class="modal-content" id="modalContent">
      <button class="modal-close" id="modalClose" aria-label="Close">×</button>
      <div id="modalBody"></div>
    </div>
  </div>

<script>
  // ────────────────────────────────────────────────────────────────────
  // Theme switcher — light / dark / system, persisted to localStorage
  // ────────────────────────────────────────────────────────────────────
  (function setupTheme(){
    const STORAGE_KEY = 'mpd-health-check-theme';
    const validThemes = ['light', 'dark', 'system'];
    const stored = localStorage.getItem(STORAGE_KEY);
    const initial = validThemes.includes(stored) ? stored : 'system';

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.querySelectorAll('.theme-switch button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.theme === theme);
      });
    }

    applyTheme(initial);

    document.querySelectorAll('.theme-switch button').forEach(btn => {
      btn.addEventListener('click', () => {
        const theme = btn.dataset.theme;
        localStorage.setItem(STORAGE_KEY, theme);
        applyTheme(theme);
      });
    });
  })();

  // ────────────────────────────────────────────────────────────────────
  // State
  // ────────────────────────────────────────────────────────────────────
  let scanned = null;  // { mpdFile, mpdText, renditions: [{name, segCount}], minSegCount, rootName }

  // ────────────────────────────────────────────────────────────────────
  // ISO 8601 duration — supports PT[n]H[n]M[n]S (full) and PT[n]S (simple)
  // ────────────────────────────────────────────────────────────────────
  function parseISODuration(duration) {
    if (!duration) return null;
    const m = duration.match(/^PT(?:(\d+(?:\.\d+)?)H)?(?:(\d+(?:\.\d+)?)M)?(?:(\d+(?:\.\d+)?)S)?$/);
    if (!m) return null;
    const h = parseFloat(m[1] || '0');
    const mi = parseFloat(m[2] || '0');
    const s = parseFloat(m[3] || '0');
    return h * 3600 + mi * 60 + s;
  }

  // ────────────────────────────────────────────────────────────────────
  // Folder scanning
  // ────────────────────────────────────────────────────────────────────
  function scanFiles(fileList) {
    const files = Array.from(fileList);
    if (!files.length) return { ok: false, error: 'No files selected.' };

    const firstPath = files[0].webkitRelativePath || files[0].name;
    const rootName = firstPath.split('/')[0] || 'folder';

    const mpdFile = files.find(f => /\.mpd$/i.test(f.name));
    if (!mpdFile) {
      return { ok: false, error: `No .mpd file found in "${rootName}". Make sure you selected the folder containing the Bento4 output.` };
    }

    const segPattern = /seg-(\d+)\.m4s$/i;
    const byFolder = new Map();

    for (const f of files) {
      const match = f.name.match(segPattern);
      if (!match) continue;
      const parts = (f.webkitRelativePath || '').split('/');
      const parent = parts.slice(0, -1).join('/') || '(root)';
      const num = parseInt(match[1], 10);
      if (!byFolder.has(parent)) byFolder.set(parent, { name: parent, max: 0, count: 0 });
      const entry = byFolder.get(parent);
      entry.max = Math.max(entry.max, num);
      entry.count += 1;
    }

    if (byFolder.size === 0) {
      return { ok: false, error: `No seg-*.m4s segment files found under "${rootName}".` };
    }

    const renditions = Array.from(byFolder.values()).map(r => ({
      name: r.name.split('/').slice(1).join('/') || r.name,
      segCount: r.max
    })).sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

    const minSegCount = Math.min(...renditions.map(r => r.segCount));

    return { ok: true, mpdFile, renditions, minSegCount, rootName };
  }

  async function readFileText(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => reject(reader.error);
      reader.readAsText(file);
    });
  }

  // ────────────────────────────────────────────────────────────────────
  // Validation math
  // ────────────────────────────────────────────────────────────────────
  function validate(mpdText, actualSegments) {
    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(mpdText, 'application/xml');

    const parseError = xmlDoc.getElementsByTagName('parsererror')[0];
    if (parseError) throw new Error('MPD file is not valid XML.');

    const mpd = xmlDoc.getElementsByTagName('MPD')[0];
    const segmentTemplate = xmlDoc.getElementsByTagName('SegmentTemplate')[0];
    if (!mpd) throw new Error('No <MPD> element found.');
    if (!segmentTemplate) throw new Error('No <SegmentTemplate> element found.');

    const mpdDurAttr = mpd.getAttribute('mediaPresentationDuration');
    const presentationDuration = parseISODuration(mpdDurAttr);
    const timescale = parseInt(segmentTemplate.getAttribute('timescale'), 10);
    const segmentDuration = parseInt(segmentTemplate.getAttribute('duration'), 10);
    const startNumber = parseInt(segmentTemplate.getAttribute('startNumber') || '1', 10);

    if (presentationDuration == null) throw new Error(`Could not parse mediaPresentationDuration ("${mpdDurAttr}").`);
    if (!timescale || !segmentDuration) throw new Error('SegmentTemplate is missing timescale or duration.');

    const expectedSegments = startNumber - 1 + Math.ceil((presentationDuration * timescale) / segmentDuration);
    const safeDuration = actualSegments * (segmentDuration / timescale);
    const safeDurationBuffered = safeDuration - 0.001;

    return {
      expectedSegments,
      actualSegments,
      presentationDuration,
      timescale,
      segmentDuration,
      startNumber,
      isHealthy: actualSegments >= expectedSegments,
      safeDurationBuffered,
      originalMpdDurAttr: mpdDurAttr
    };
  }

  // ────────────────────────────────────────────────────────────────────
  // Build a fixed MPD — only rewrites mediaPresentationDuration
  // ────────────────────────────────────────────────────────────────────
  function buildFixedMpd(mpdText, originalAttrValue, newSeconds) {
    const newAttrValue = `PT${newSeconds.toFixed(3)}S`;
    const re = /mediaPresentationDuration\s*=\s*(["'])([^"']*)\1/;
    return mpdText.replace(re, `mediaPresentationDuration="${newAttrValue}"`);
  }

  function downloadText(filename, text) {
    const blob = new Blob([text], { type: 'application/dash+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  // ────────────────────────────────────────────────────────────────────
  // UI helpers
  // ────────────────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  function renderScanInfo(result) {
    const box = $('scanInfo');
    const body = $('scanInfoBody');
    const renditionsHtml = result.renditions.map(r =>
      `<div class="scan-info-row"><span>Rendition <code style="font-family:var(--mono);font-size:12px;">${escapeHtml(r.name)}</code></span><span>${r.segCount} segs</span></div>`
    ).join('');
    body.innerHTML = `
      <div class="scan-info-row"><span>Root</span><span>${escapeHtml(result.rootName)}</span></div>
      <div class="scan-info-row"><span>MPD</span><span>${escapeHtml(result.mpdFile.name)}</span></div>
      ${renditionsHtml}
      <div class="scan-info-row total"><span>Safest count (using lowest)</span><span>${result.minSegCount}</span></div>
    `;
    box.classList.add('show');
  }

  function showModal(html) {
    $('modalBody').innerHTML = html;
    $('modalOverlay').classList.add('show');
  }

  function closeModal() { $('modalOverlay').classList.remove('show'); }

  function renderHealthy() {
    showModal(`
      <div class="result-icon-wrap">
        <svg viewBox="0 0 64 64" width="56" height="56" aria-hidden="true">
          <circle cx="32" cy="32" r="28" fill="var(--success-bg)" stroke="var(--success-border)" stroke-width="2"/>
          <path d="M20 33 L28 41 L44 24" fill="none" stroke="var(--success)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="result-title good">All good</div>
      <div class="result-sub">The MPD and your segments are in sync.<br>No phantom segments detected.</div>
      <div class="modal-actions">
        <button class="secondary" onclick="closeModal()">Close</button>
      </div>
    `);
  }

  function renderUnhealthy(v, mpdText, mpdFileName) {
    const safeDurStr = `PT${v.safeDurationBuffered.toFixed(3)}S`;
    showModal(`
      <div class="result-icon-wrap">
        <svg viewBox="0 0 64 64" width="56" height="56" aria-hidden="true">
          <circle cx="32" cy="32" r="28" fill="var(--danger-bg)" stroke="var(--danger-border)" stroke-width="2"/>
          <line x1="32" y1="22" x2="32" y2="36" stroke="var(--danger)" stroke-width="4" stroke-linecap="round"/>
          <circle cx="32" cy="44" r="2.5" fill="var(--danger)"/>
        </svg>
      </div>
      <div class="result-title bad">Phantom segment detected</div>
      <div class="result-sub">The MPD declares more duration than your segments cover.<br>Players may stall or error at the tail of playback.</div>

      <div class="result-numbers">
        <div class="result-numbers-row"><span>Expected segments</span><span>${v.expectedSegments}</span></div>
        <div class="result-numbers-row"><span>Actual segments</span><span>${v.actualSegments}</span></div>
        <div class="result-numbers-row"><span>Shortfall</span><span>${v.expectedSegments - v.actualSegments}</span></div>
        <div class="result-numbers-row"><span>Current duration</span><span>${v.originalMpdDurAttr}</span></div>
      </div>

      <div class="fix-suggestion">
        <div class="fix-suggestion-label">Recommended mediaPresentationDuration</div>
        <div class="fix-suggestion-value">${safeDurStr}</div>
      </div>

      <div class="modal-actions">
        <button class="secondary" onclick="closeModal()">Close</button>
        <button id="downloadFixBtn">Download fixed MPD</button>
      </div>
    `);

    $('downloadFixBtn').addEventListener('click', () => {
      const fixed = buildFixedMpd(mpdText, v.originalMpdDurAttr, v.safeDurationBuffered);
      downloadText(mpdFileName, fixed);
    });
  }

  function renderError(msg) {
    showModal(`
      <div class="result-icon-wrap">
        <svg viewBox="0 0 64 64" width="56" height="56" aria-hidden="true">
          <circle cx="32" cy="32" r="28" fill="var(--danger-bg)" stroke="var(--danger-border)" stroke-width="2"/>
          <line x1="24" y1="24" x2="40" y2="40" stroke="var(--danger)" stroke-width="4" stroke-linecap="round"/>
          <line x1="40" y1="24" x2="24" y2="40" stroke="var(--danger)" stroke-width="4" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="result-title bad">Couldn't check</div>
      <div class="error-message">${escapeHtml(msg)}</div>
      <div class="modal-actions">
        <button class="secondary" onclick="closeModal()">Close</button>
      </div>
    `);
  }

  // ────────────────────────────────────────────────────────────────────
  // Event wiring
  // ────────────────────────────────────────────────────────────────────
  const folderInput = $('folderInput');
  const checkBtn = $('checkBtn');

  async function handleFiles(fileList) {
    if (!fileList || fileList.length === 0) return;

    const result = scanFiles(fileList);
    if (!result.ok) {
      scanned = null;
      checkBtn.disabled = true;
      $('scanInfo').classList.remove('show');
      renderError(result.error);
      return;
    }
    try {
      const mpdText = await readFileText(result.mpdFile);
      scanned = { ...result, mpdText };
      renderScanInfo(result);
      checkBtn.disabled = false;
      $('pickerBtnLabel').textContent = 'Change folder';
      $('pickerHint').textContent = `Loaded: ${result.rootName}`;
    } catch (e) {
      scanned = null;
      checkBtn.disabled = true;
      renderError('Failed to read MPD file: ' + e.message);
    }
  }

  folderInput.addEventListener('change', e => handleFiles(e.target.files));

  checkBtn.addEventListener('click', () => {
    if (!scanned) return;
    try {
      const v = validate(scanned.mpdText, scanned.minSegCount);
      if (v.isHealthy) {
        renderHealthy();
      } else {
        renderUnhealthy(v, scanned.mpdText, scanned.mpdFile.name);
      }
    } catch (e) {
      renderError(e.message);
    }
  });

  $('modalClose').addEventListener('click', closeModal);
  $('modalOverlay').addEventListener('click', e => {
    if (e.target.id === 'modalOverlay') closeModal();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });
</script>
</body>
</html>
